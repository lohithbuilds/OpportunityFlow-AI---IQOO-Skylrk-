name: opportunity_flow_ai
description: OpportunityFlow AI — The Interactive Opportunity Mentor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.16
  iconsax_flutter: ^1.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.8.0+1
  http: ^1.3.0

  # File & Media
  file_picker: ^10.3.7
  image_picker: ^1.1.2

  # Storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.8.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
