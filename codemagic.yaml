workflows:
  android-workflow:
    name: OpportunityFlow Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Clean project
        script: |
          cd frontend
          flutter clean
      - name: Get Flutter packages
        script: |
          cd frontend
          flutter pub get
      - name: Build APK
        script: |
          cd frontend
          flutter build apk --release
    artifacts:
      - frontend/build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - harteij19@gmail.com
        notify:
          success: true
          failure: true
