workflows:
  android-release:
    name: OpportunityFlow Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Clean project
        script: |
          cd frontend
          flutter clean
          rm -rf android/.gradle
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
      - name: Set compileSdk to 36
        script: |
          cd frontend
          sed -i 's/compileSdk = [0-9]*/compileSdk = 36/' android/app/build.gradle
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/' android/app/build.gradle
          sed -i 's/targetSdk = [0-9]*/targetSdk = 36/' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 36/' android/app/build.gradle
      - name: Get Flutter packages
        script: |
          cd frontend
          flutter pub get
      - name: Build APK
        script: |
          cd frontend
          flutter build apk --release
    artifacts:
      - frontend/build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - harteij19@gmail.com
        notify:
          success: true
          failure: true
