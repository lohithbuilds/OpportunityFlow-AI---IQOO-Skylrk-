workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          cd frontend
          flutter pub get

      - name: Build APK (release)
        script: |
          cd frontend
          flutter build apk --release

    artifacts:
      - frontend/build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - harteij19@gmail.com
        notify:
          success: true
          failure: true
